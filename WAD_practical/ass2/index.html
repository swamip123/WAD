<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3 class="text-center mb-4">User Registration</h3>

    <form id="registerForm">
      
      <input type="text" id="name" class="form-control mb-3" placeholder="Enter Name" required>

      <input type="email" id="email" class="form-control mb-3" placeholder="Enter Email" required>

      <input type="password" id="password" class="form-control mb-3" placeholder="Enter Password" required>

      <button type="submit" class="btn btn-primary w-100">Register</button>

    </form>
  </div>
</div>

<!-- Add this BELOW the form card -->

<div class="container mt-4">
  <div class="card p-4 shadow">
    <h4 class="text-center mb-3">Registered Users</h4>

    <table class="table table-bordered">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="userTable"></tbody>
</table>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
